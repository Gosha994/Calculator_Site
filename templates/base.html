<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/icon.png') }}">
    <title>{{ title }}</title>
</head>
<style>
    .btn-custom-light {
        border-radius: 0.5rem;
        color: #363636;
        font-weight: 650;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 15px;
    }

    .btn-custom-light:hover {
        background-color: #e8e8e8;
        color: black;
        border-radius: 0.5rem;
        font-weight: 650;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 15px;
    }
</style>
<style>
    .navbar-brand {
        border-radius: 0.3rem;
        padding: 8px 16px;
        font-weight: 700;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 180%;
    }

    .navbar-brand:hover {
        background-color: #e8e8e8;
        color: white;
        border-radius: 0.3rem;
        padding: 8px 16px;
        font-weight: 700;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 180%;
    }
</style>
<body>
<header>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <nav class="navbar navbar-light bg-light fixed-top">
        <div class="container-fluid">
            <!-- Левая часть -->
            <div class="d-flex align-items-center">
                <a class="navbar-brand" href="/">
                    <img src="{{ url_for('static', filename='assets/icon.png') }}"
                         width="50"
                         height="50"
                         alt="Ошибка загрузки изображения">
                    Наш сайт
                </a>

                <a class="btn btn-light btn-custom-light rounded-4" href="/news"><i class="bi bi-info-circle"></i>
                    Новости</a>
                <a class="btn btn-light btn-custom-light rounded-4" href="/profile"><i class="bi-person-circle"></i>
                    Профиль</a>
                <a class="btn btn-light btn-custom-light rounded-4" href="/projects"><i class="bi bi-briefcase"></i>
                    Наши проекты</a>
                <a class="btn btn-light btn-custom-light rounded-4" href="/developers"><i class="bi bi-people"></i>
                    Разработчики</a>
                <a class="btn btn-light btn-custom-light rounded-4" href="/help"><i class="bi bi-question-circle"></i>
                    Помощь</a>
                <a class="btn btn-light btn-custom-light rounded-4" href="/re-help"><i class="bi bi-envelope"></i>
                    Обратная связь</a>
            </div>

            <!-- Правая часть -->
            <div class="d-flex align-items-center">
                {% if current_user.is_authenticated %}
                <span class="navbar-text me-2">
                    Аккаунт: {{ current_user.name }}
                </span>
                <a class="btn btn-outline-danger" href="/logout">Выйти</a>
                {% else %}
                <a class="btn btn-primary me-2" href="/register">Зарегистрироваться</a>
                <a class="btn btn-success" href="/login">Войти</a>
                {% endif %}
            </div>
        </div>
    </nav>
</header>
<main style="margin-top: 180px;">
    <div role="main" class="container mt-4 mx-5">
        {% block content %}{% endblock %}
    </div>

</main>
</body>
</html>
