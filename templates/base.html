<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/icon.png') }}">
    <title>{{ title }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><h2>
                <img src="{{ url_for('static', filename='assets/icon.png') }}"
                     width="50"
                     height="50"
                     alt="Ошибка загрузки изображения">
                Наш сайт</h2>
            </a>
            <a class="navbar-brand" href="/news"><h4>Новости</h4></a>
            <a class="navbar-brand" href="/developers"><h4>Разработчики</h4></a>
            <a class="navbar-brand" href="/re-help"><h4>Обратная связь</h4></a>
            <a class="navbar-brand" href="/help"><h4>Помощь</h4></a>
            <a class="navbar-brand" href="/progress"><h4>Достижения</h4></a>
            <a class="navbar-brand" href="/projects"><h4>Наши проекты</h4></a>
            {% if current_user.is_authenticated %}
            <span class="navbar-text">
                    Аккаунт: {{ current_user.name }}
                </span>
            <a class="btn btn-outline-danger" href="/logout">Выйти</a>
            {% else %}
            <p>
                <a class="btn btn-primary" href="/register">Зарегистрироваться</a>
                <a class="btn btn-success" href="/login">Войти</a>
            </p>
            {% endif %}
        </div>
    </nav>
</header>
<main role="main" class="container mt-3">
    {% block content %}{% endblock %}
</main>
</body>
</html>
