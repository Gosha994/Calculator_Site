{% extends "base.html" %}

{% block content %}
<h1 class="text-center mb-5 display-5 fw-bold">Наши проекты</h1>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for prj in projects %}
    <div class="col">
        <div class="card h-100 shadow-sm">
            <!-- Аватарка -->
            <div class="text-center mt-3">
                <img src="{{ url_for('static', filename='projects/' + prj.ava) }}"
                     alt="Аватарка {{ prj.project_name }}"
                     style="width: 120px; height: 120px; object-fit: cover;">
            </div>
            <div class="card-body d-flex flex-column">
                <h5 class="card-title text-center">
                    {{ prj.project_name }}
                    <!--                    <small class="text-muted">(@{{ prj.nickname }})</small>-->
                </h5>
                <!-- Роль в проекте -->
                <p class="card-subtitle mb-2 text-muted text-center">{{ prj.info }}</p>

                <div class="mt-auto text-center">
                    <a href="{{ prj.url }}" target="_blank" class="btn btn-success btn-sm mt-2">
                        <i class="bi bi-check-circle-fill"></i> Подробнее о проекте
                    </a>
                </div>

                <div class="mt-auto text-center">
                    <a href="{{ prj.github }}" target="_blank" class="btn btn-outline-dark btn-sm mt-2">
                        <i class="bi bi-github"></i> Исходный код
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
