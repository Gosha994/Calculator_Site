{% extends "base.html" %}

{% block content %}
<h1 class="text-center mb-5 display-5 fw-bold">Команда разработчиков</h1>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for dev in developers %}
    <div class="col">
        <div class="card h-100 shadow-sm">
            <!-- Аватарка -->
            <div class="text-center mt-3">
                <img src="{{ url_for('static', filename='developers/' + dev.ava) }}"
                     alt="Аватарка {{ dev.name }}"
                     class="rounded-circle"
                     style="width: 120px; height: 120px; object-fit: cover;">
            </div>
            <div class="card-body d-flex flex-column">
                <h5 class="card-title text-center">
                    {{ dev.name }}
                    <small class="text-muted">(@{{ dev.nickname }})</small>
                </h5>
                <!-- Роль в проекте -->
                <p class="card-subtitle mb-2 text-muted text-center">{{ dev.role }}</p>

                <h6 class="card-subtitle mb-2 mt-2">Участвовал в проектах:</h6>
                <ul class="list-unstyled">
                    {% for project in dev.projects %}
                    <li><i class="bi bi-check-circle-fill text-success me-2"></i>{{ project }}</li>
                    {% endfor %}
                </ul>

                <div class="mt-auto text-center">
                    <a href="{{ dev.github }}" target="_blank" class="btn btn-outline-dark btn-sm mt-2">
                        <i class="bi bi-github"></i> GitHub профиль
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
